<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未知 CHAMPION | Digital Nomad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === BASIC SETUP === */
        :root {
            --neon: #ffffff; 
            --darkbg: #030303; 
            --accent: #2c2c2c; 
            --glass: rgba(255, 255, 255, 0.03); 
            --shadow: 0 0 15px rgba(255, 255, 255, 0.5); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        body { background-color: var(--darkbg); color: var(--neon); overflow: hidden; height: 100vh; position: relative; }
        a { text-decoration: none; color: inherit; }
        button { border: none; background: transparent; cursor: pointer; }

        /* === PRELOADER / INTRO === */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        #intro.fade-out { opacity: 0; pointer-events: none; }
        .intro-text { font-size: 3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 5px; color: #111; animation: glitch 2s infinite; margin-bottom: 20px; text-align: center;}
        .click-me-btn { padding: 18px 45px; border: 2px solid var(--neon); color: var(--neon); font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: 0.3s; }
        .click-me-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
        .click-me-btn:hover { background: var(--neon); color: #000; }
        .click-me-btn:hover::before { left: 100%; }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; color: #fff; }
            2% { text-shadow: 2px 0 red, -2px 0 blue; color: #fff; }
        }

        /* === MAIN CONTAINER === */
        #main-content { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; position: relative; z-index: 10; }
        .profile-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* === AVATAR STYLE === */
        .avatar-container { width: 150px; height: 150px; margin: 0 auto 25px; position: relative; border-radius: 50%; padding: 5px; background: linear-gradient(45deg, var(--neon), transparent); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #000; }
        
        .name { font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .title { font-size: 1.1rem; color: #888; font-weight: 400; margin-bottom: 20px; letter-spacing: 1px; }
        .bio { font-size: 0.95rem; color: #ccc; line-height: 1.6; margin-bottom: 30px; }
        
        /* === SOCIAL ICONS === */
        .social-links { display: flex; justify-content: center; gap: 20px; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; transition: 0.3s; background: rgba(0,0,0,0.3); }
        .social-btn:hover { background: var(--neon); color: #000; box-shadow: var(--shadow); transform: translateY(-5px); }
        
        /* === CANVAS BACKGROUND === */
        canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <!-- INTRO SPLASH SCREEN -->
    <div id="intro">
        <h1 class="intro-text">CHAMPION GUPTA</h1>
        <button class="click-me-btn" onclick="startExperience()">Enter Experience</button>
    </div>

    <!-- MAIN PORTFOLIO CARD -->
    <div id="main-content">
        <div class="profile-card">
            <div class="avatar-container">
                <!-- 🎯 TUHADI PHOTO DA CODE ETHE SET KAR DITA HAI -->
                <img src="95ef2892f817fa96a77de279cea784c6.jpg" alt="CHAMPION" class="avatar">
            </div>
            <h1 class="name">HI, I'M CHAMPION</h1>
            <p class="title">UI/UX Designer & Developer</p>
            <p class="bio">I'm a passionate self-taught developer who loves building creative digital experiences. I enjoy creating websites, Telegram bots, modern UI designs, and interactive web applications.</p>
            
            <div class="social-links">
                <a href="#" target="_blank" class="social-btn"><i class="fab fa-telegram-plane"></i></a>
                <a href="#" target="_blank" class="social-btn"><i class="fab fa-youtube"></i></a>
                <a href="#" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        function startExperience() {
            document.getElementById('intro').classList.add('fade-out');
        }

        // Particle background logic
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speedY = Math.random() * 0.5 + 0.1;
                this.size = Math.random() * 1.5;
            }
            update() {
                this.y -= this.speedY;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
