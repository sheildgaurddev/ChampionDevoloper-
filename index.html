<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未知 CHAMPION | Digital Nomad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === BASIC SETUP === */
        :root {
            --neon: #ffffff; 
            --darkbg: #030303; 
            --accent: #2c2c2c; 
            --glass: rgba(255, 255, 255, 0.03); 
            --shadow: 0 0 15px rgba(255, 255, 255, 0.5); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        body { background-color: var(--darkbg); color: var(--neon); overflow: hidden; height: 100vh; position: relative; }
        a { text-decoration: none; color: inherit; }
        button { border: none; background: transparent; cursor: pointer; }

        /* === PRELOADER / INTRO === */
        #intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease-out; }
        #intro.fade-out { opacity: 0; pointer-events: none; }
        .intro-text { font-size: 3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 5px; color: #111; animation: glitch 2s infinite; margin-bottom: 20px; text-align: center;}
        .click-me-btn { padding: 18px 45px; border: 2px solid var(--neon); color: var(--neon); font-size: 1.3rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: 0.3s; }
        .click-me-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.5s; }
        .click-me-btn:hover { background: var(--neon); color: #000; }
        .click-me-btn:hover::before { left: 100%; }

        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; color: #fff; }
            2% { text-shadow: 2px 0 red, -2px 0 blue; color: #fff; }
            4% { text-shadow: -2px 0 red, 2px 0 blue; color: #fff; }
            6% { text-shadow: none; color: #111; }
            100% { text-shadow: none; color: #111; }
        }

        /* === BACKGROUND EFFECTS === */
        #bg-canvas { position: fixed; inset: 0; z-index: -2; opacity: 0.5; }
        .v-lines { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .v-lines span { position: absolute; top: -100%; width: 1px; height: 100vh; background: linear-gradient(to bottom, transparent, var(--neon)); animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(200vh); } }

        /* === MAIN CONTENT === */
        #main-content { display: none; padding: 20px; opacity: 0; transition: opacity 1s ease-in; position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; overflow-y: auto; align-items: center; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        /* === HEADER === */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 30px 0; position: sticky; top: 0; background: linear-gradient(to bottom, var(--darkbg) 60%, transparent); z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); text-shadow: 0 0 10px var(--neon); animation: logo-glow 3s infinite alternate; }
        @keyframes logo-glow { from { text-shadow: 0 0 5px var(--neon); } to { text-shadow: 0 0 20px var(--neon), 0 0 30px var(--neon); } }
        
        .nav-links { display: flex; gap: 15px; }
        .nav-btn { color: var(--neon); text-transform: uppercase; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 30px; transition: 0.3s; position: relative; overflow: hidden; }
        .nav-btn::after { content: ''; position: absolute; inset: 0; background: var(--neon); opacity: 0; transition: 0.3s; z-index: -1; }
        .nav-btn:hover { color: #000; border-color: var(--neon); box-shadow: var(--shadow); }
        .nav-btn:hover::after { opacity: 1; }

        /* === PROFILE CARD === */
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 50px; width: 100%; max-width: 600px; text-align: center; margin: 40px 0; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(20px); transition: transform 0.6s ease, box-shadow 0.6s ease; }
        .glass-card:hover { transform: translateY(0) scale(1.02); box-shadow: 0 15px 50px rgba(0,0,0,0.7), 0 0 15px rgba(255,255,255,0.1); }
        .glass-card::before { content: ''; position: absolute; inset: 0; border-radius: 30px; padding: 2px; background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent 50%, rgba(255,255,255,0.2)); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }

        .profile-img-container { position: relative; width: 160px; height: 160px; margin: 0 auto 30px; }
        
        /* 🎯 ETHRE TUHADI PHOTO DA CODE SET KAR DITTA HAI, BAKI SARA STYLE SEIME HAI */
        .profile-img { width: 100%; height: 100%; object-fit: cover; content: url('95ef2892f817fa96a77de279cea784c6.jpg'); border-radius: 25px; border: 2px solid var(--neon); box-shadow: var(--shadow); transition: 0.5s; }
        
        .profile-img-container:hover .profile-img { transform: rotate(5deg) scale(1.1); box-shadow: 0 0 30px var(--neon); }
        .profile-img-container::after { content: ''; position: absolute; inset: -10px; border: 1px dashed rgba(255,255,255,0.3); border-radius: 35px; animation: rotate-dashed 10s linear infinite; }
        @keyframes rotate-dashed { to { transform: rotate(360deg); } }

        /* === TEXT & ANIMATIONS === */
        h1 { font-size: 2.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .role-wrapper { font-size: 1.2rem; font-weight: 400; color: rgba(255,255,255,0.8); height: 30px; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        #typing-role { color: var(--neon); font-weight: 600; text-shadow: 0 0 5px var(--neon); }
        .cursor { display: inline-block; width: 2px; background-color: var(--neon); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
